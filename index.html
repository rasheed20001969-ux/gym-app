<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>تطوري الرياضي</title>
<style>
:root{--bg:#081120;--card:#10213A;--card2:#132844;--text:#fff;--muted:#9fb0c6;--green:#28d17c;--red:#ff6b75;--blue:#38bdf8;--line:rgba(255,255,255,.09)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Tahoma,Arial,sans-serif;padding-bottom:92px}button,input,textarea{font-family:inherit}.app{max-width:560px;margin:auto;min-height:100vh;padding:26px 18px}.screen{display:none}.screen.active{display:block}.muted{color:var(--muted)}h1{font-size:34px;margin:8px 0 8px}h2{font-size:26px;margin:0}.top{text-align:right;margin-bottom:22px}.day{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid rgba(56,189,248,.16);border-radius:22px;padding:22px 18px;margin:14px 0;box-shadow:0 8px 22px rgba(0,0,0,.18);cursor:pointer}.emoji{width:56px;height:56px;display:grid;place-items:center;border-radius:16px;background:#0b1a2e;font-size:28px}.grow{flex:1}.badge{background:rgba(40,209,124,.13);border:1px solid rgba(40,209,124,.28);color:var(--green);padding:9px 14px;border-radius:18px;font-weight:bold;white-space:nowrap}.hero{background:linear-gradient(135deg,#10213A,#0d1a31);border:1px solid rgba(56,189,248,.12);border-radius:24px;padding:28px 20px;margin:8px 0 22px}.grid{display:grid;grid-template-columns:1fr;gap:14px}.ex{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;position:relative;min-height:210px;cursor:pointer}.pill{position:absolute;top:18px;left:18px;background:rgba(255,209,102,.13);color:#ffd166;border-radius:13px;padding:6px 10px;font-size:13px;font-weight:bold}.ex h3{font-size:22px;margin:0 0 24px;max-width:76%;line-height:1.25}.label{color:var(--blue);font-weight:bold;margin:12px 0 6px}.bad{color:var(--red);font-weight:bold}.nav{position:fixed;bottom:0;left:0;right:0;background:#08111f;border-top:1px solid var(--line);display:flex;justify-content:center;gap:10px;padding:12px 10px;z-index:10}.nav button{border:0;background:transparent;color:#c7d2e5;border-radius:18px;padding:10px 18px;font-weight:bold;font-size:14px}.nav button.active{background:rgba(40,209,124,.16);color:var(--green)}.back{border:0;background:#132844;color:#fff;border-radius:16px;padding:12px 16px;margin-bottom:15px}.form{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0}input,textarea{width:100%;background:#081120;border:1px solid var(--line);border-radius:14px;color:#fff;padding:12px;margin:6px 0 10px}.btn{border:0;background:var(--green);color:#062013;border-radius:16px;padding:12px 16px;font-weight:bold}.btn2{border:1px solid var(--line);background:#132844;color:#fff;border-radius:14px;padding:10px 12px}.row{display:flex;gap:8px;align-items:center}.setrow{display:grid;grid-template-columns:70px 1fr 1fr 44px;gap:8px;align-items:center;margin:10px 0}.num{color:var(--green);font-weight:bold}.check{width:38px;height:38px;border-radius:50%;background:#0b1a2e;border:1px solid var(--line);color:#fff}.check.done{background:var(--green);color:#062013}.small{font-size:13px}.adminItem{display:flex;align-items:center;gap:8px;background:#0c1b30;border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}.adminItem b{flex:1}.hide{display:none!important}@media(min-width:760px){.app{max-width:900px}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen active"></section>
<section id="plan" class="screen"></section>
<section id="day" class="screen"></section>
<section id="run" class="screen"></section>
<section id="history" class="screen"></section>
<section id="admin" class="screen"></section>
</div>
<div class="nav">
<button onclick="show('home')" id="n-home">🏠<br>الرئيسية</button>
<button onclick="show('plan')" id="n-plan">📋<br>الخطة</button>
<button onclick="show('history')" id="n-history">📈<br>السجل</button>
<button onclick="show('admin')" id="n-admin">🛠️<br>الإدارة</button>
</div>
<script>
const VERSION='final_fullbody_v3';
const seedDays=[
{day:'السبت',title:'Full Body خفيف',emoji:'🔥',desc:'جلسة تنشيط لكامل الجسم بهدف زيادة الحرق وتحفيز العضلات بدون إجهاد عالي.',ex:[
{name:'Shoulder Press',sets:3,reps:'10',targetWeight:'',technique:'ادفع للأعلى مع شد البطن وعدم تقويس الظهر.',mistake:'تقويس أسفل الظهر'},
{name:'Lat Pulldown',sets:3,reps:'10',targetWeight:'',technique:'اسحب البار للصدر مع تثبيت الجسم وتحكم كامل في النزول.',mistake:'الاندفاع بالجسم'},
{name:'Chest Press',sets:3,reps:'10',targetWeight:'',technique:'ادفع للأمام بثبات وارجع ببطء مع الحفاظ على شد الصدر.',mistake:'قفل المرفق أو رفع الكتف'},
{name:'Technogym Elliptical',sets:1,reps:'15-20 دقيقة',targetWeight:'',technique:'كارديو بعد التمرين، سرعة متوسطة ومقاومة ثابتة.',mistake:'الاعتماد على اليدين بدل الرجلين'},
{name:'Cable Row',sets:3,reps:'10',targetWeight:'',technique:'اسحب باتجاه البطن مع جمع لوحي الكتف.',mistake:'السحب بالذراع فقط'},
{name:'Leg Press',sets:3,reps:'12',targetWeight:'',technique:'انزل ببطء وادفع بدون قفل الركبة.',mistake:'رفع الحوض'}]},
{day:'الأحد',title:'صدر + باي',emoji:'🔥',desc:'جلسة تركّز على بناء عضلات الصدر وزيادة قوة الذراع مع تحكم عالي في الأداء.',ex:[
{name:'Cable Fly',sets:3,reps:'12-15',targetWeight:'',technique:'اجمع اليدين أمام الصدر مع عصر العضلة، وارجع ببطء.',mistake:'تحويل التمرين إلى ضغط'},
{name:'Incline Chest Press',sets:3,reps:'8-10',targetWeight:'',technique:'ادفع للأعلى قليلًا مع التركيز على الصدر العلوي وتحكم كامل بالنزول.',mistake:'فتح الكوع بزاوية كبيرة'},
{name:'Technogym Chest Press',sets:4,reps:'6-8',targetWeight:'',technique:'ادفع المقابض للأمام مع تثبيت الظهر، وارجع ببطء حتى تمدد عضلة الصدر.',mistake:'رفع الكتف أو دفع الجسم للأمام'},
{name:'Hammer Curl',sets:3,reps:'10-12',targetWeight:'',technique:'ارفع الدمبل بشكل مستقيم بدون تحريك الكتف.',mistake:'هز الجسم أثناء التمرين'},
{name:'Preacher Curl',sets:3,reps:'10-12',targetWeight:'',technique:'ارفع المقبض ببطء مع تثبيت الذراع، وارجع بتحكم.',mistake:'استخدام الزخم'}]},
{day:'الاثنين',title:'ظهر',emoji:'💪',desc:'جلسة تركّز على توسيع الظهر وزيادة السماكة مع تحكم كامل بالحركة.',ex:[
{name:'Seated Machine Row',sets:3,reps:'10-12',targetWeight:'',technique:'صدر مرفوع، اسحب ببطء وارجع بتحكم كامل.',mistake:'رمي الوزن بسرعة'},
{name:'Technogym Row Machine',sets:4,reps:'8-10',targetWeight:'',technique:'اسحب المقبض باتجاه البطن مع جمع لوحي الكتف.',mistake:'السحب بالذراع فقط'},
{name:'Technogym Lat Pulldown',sets:4,reps:'8-10',targetWeight:'',technique:'اسحب البار نحو صدرك مع إنزال الكتفين للخلف وتحت، وارجع ببطء.',mistake:'السحب خلف الرقبة أو الاندفاع بالجسم'},
{name:'Straight Arm Pulldown',sets:3,reps:'12-15',targetWeight:'',technique:'اسحب البار للأسفل بذراع شبه مستقيمة مع تركيز على اللات.',mistake:'ثني الكوع وتحويله لتراي'}]},
{day:'الأربعاء',title:'كتف + تراي',emoji:'⚡',desc:'جلسة لبناء عرض الكتف وتحسين قوة الدفع مع عزل الترايسبس بشكل ذكي.',ex:[
{name:'Rear Delt / Face Pull',sets:3,reps:'12-15',targetWeight:'',technique:'اسحب الحبل باتجاه الوجه مع فتح الذراعين للخلف.',mistake:'سحب بالذراع فقط'},
{name:'Lateral Raise',sets:4,reps:'12-15',targetWeight:'',technique:'ارفع الذراعين للجانب حتى مستوى الكتف مع وزن خفيف وتحكم.',mistake:'رفع الكتف للأذن'},
{name:'Technogym Shoulder Press',sets:4,reps:'6-8',targetWeight:'',technique:'ادفع للأعلى مع تثبيت الظهر وشد البطن، ثم انزل ببطء.',mistake:'تقويس أسفل الظهر'},
{name:'Overhead Triceps Extension',sets:3,reps:'10-12',targetWeight:'',technique:'مد الذراع للأعلى مع إبقاء الكوع قريب من الرأس.',mistake:'فتح الكوع بشكل مبالغ'},
{name:'Cable Triceps Pushdown',sets:3,reps:'10-12',targetWeight:'',technique:'ادفع للأسفل مع تثبيت الكوع بجانب الجسم.',mistake:'تحريك الكتف'}]},
{day:'الخميس',title:'أرجل',emoji:'🦵',desc:'نسخة محسّنة ومختصرة ليوم الأرجل مع حجم تمرين مناسب للتنشيف والاستشفاء.',ex:[
{name:'Technogym Leg Curl',sets:3,reps:'10-12',targetWeight:'',technique:'اسحب بالكعب للخلف وتحكم بالنزول ببطء.',mistake:'رمي الوزن بسرعة'},
{name:'Technogym Leg Press',sets:3,reps:'10-12',targetWeight:'',technique:'انزل حتى 90 درجة ثم ادفع بدون قفل الركبة.',mistake:'رفع الحوض من المقعد'},
{name:'Romanian Deadlift',sets:3,reps:'8-10',targetWeight:'',technique:'ادفع الحوض للخلف مع ظهر مستقيم، وانزل حتى تشعر بتمدد الخلفية.',mistake:'تحديب الظهر'},
{name:'Smith Squat',sets:4,reps:'6-8',targetWeight:'',technique:'انزل حتى الفخذ قريب من الموازي مع تثبيت الظهر، ثم ادفع من الكعب للأعلى.',mistake:'دخول الركبتين للداخل'}]}
];
function fresh(){localStorage.setItem('gym_version',VERSION);localStorage.setItem('gym_days',JSON.stringify(seedDays));localStorage.setItem('gym_hist','[]')}
if(localStorage.getItem('gym_version')!==VERSION) fresh();
let days=JSON.parse(localStorage.getItem('gym_days')||'[]'), hist=JSON.parse(localStorage.getItem('gym_hist')||'[]'), curDay=0, curEx=0;
function save(){localStorage.setItem('gym_days',JSON.stringify(days));localStorage.setItem('gym_hist',JSON.stringify(hist))}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));let n=document.getElementById('n-'+id);if(n)n.classList.add('active'); if(id==='home')renderHome(); if(id==='plan')renderPlan(); if(id==='history')renderHistory(); if(id==='admin')renderAdmin()}
function renderHome(){home.innerHTML=`<div class="top"><p class="muted">مرحباً رشيد الحسن</p><h1>تطوري الرياضي</h1><p class="muted">تابع خطتك وسجّل أوزانك وتكراراتك.</p></div><div class="hero"><h2>خطة الأسبوع</h2><p class="muted">الأيام المعتمدة حسب الصور الصحيحة.</p></div>${days.map((d,i)=>`<div class="day" onclick="openDay(${i})"><div class="emoji">${d.emoji}</div><div class="grow"><h2>${d.day}</h2><div class="muted">${d.title}</div></div><div class="badge">${d.ex.length} تمارين</div></div>`).join('')}`;}
function renderPlan(){plan.innerHTML=`<div class="top"><p class="muted">مرحباً رشيد الحسن</p><h1>خطة التمارين</h1><p class="muted">اختر اليوم لعرض التمارين وتسجيل الأداء.</p></div>${days.map((d,i)=>`<div class="day" onclick="openDay(${i})"><div class="emoji">${d.emoji}</div><div class="grow"><h2>${d.day}</h2><div class="muted">${d.title}</div></div><div class="badge">${d.ex.length} تمارين</div></div>`).join('')}`;}
function openDay(i){curDay=i; show('day'); renderDay()}
function renderDay(){let d=days[curDay];day.innerHTML=`<button class="back" onclick="show('plan')">رجوع</button><div class="hero"><h1>${d.emoji} ${d.day} — ${d.title}</h1><p class="muted">${d.desc}</p></div><div class="grid">${d.ex.map((e,i)=>`<div class="ex" onclick="startEx(${i})"><div class="pill">${e.reps} × ${e.sets}</div><h3>${e.name}</h3><div class="label">الأداء:</div><p>${e.technique}</p><div class="label">خطأ:</div><p class="bad">${e.mistake}</p></div>`).join('')}</div>`}
function startEx(i){curEx=i;show('run');renderRun()}
function renderRun(){let d=days[curDay],e=d.ex[curEx];let reps=String(e.reps).match(/\d+/)?.[0]||'';run.innerHTML=`<button class="back" onclick="openDay(${curDay})">رجوع</button><div class="hero"><h2>${e.name}</h2><p class="muted">${d.day} — تمرين ${curEx+1} من ${d.ex.length}</p><p>الهدف: ${e.sets} جولات × ${e.reps} تكرار ${e.targetWeight?`— وزن ${e.targetWeight} كجم`:''}</p></div><div class="form">${Array.from({length:e.sets},(_,i)=>`<div class="setrow"><div class="num">جولة ${i+1}</div><input placeholder="وزن" value="${e.targetWeight||''}"><input placeholder="عدات" value="${reps}"><button class="check" onclick="this.classList.toggle('done');this.textContent=this.classList.contains('done')?'✓':''"></button></div>`).join('')}<textarea id="note" placeholder="ملاحظات"></textarea><button class="btn" onclick="finishEx()">حفظ والتالي</button></div>`}
function finishEx(){let d=days[curDay],e=d.ex[curEx];hist.unshift({date:new Date().toLocaleDateString('ar-SA'),day:d.day,name:e.name});save(); if(curEx<d.ex.length-1){curEx++;renderRun()}else{show('history')}}
function renderHistory(){history.innerHTML=`<div class="top"><h1>السجل</h1><p class="muted">عدد التمارين المسجلة: ${hist.length}</p></div>${hist.length?hist.map(h=>`<div class="form"><b>${h.name}</b><p class="muted">${h.day} — ${h.date}</p></div>`).join(''):'<div class="form muted">لا يوجد سجل بعد.</div>'}`}
function renderAdmin(){admin.innerHTML=`<div class="top"><h1>الإدارة</h1><p class="muted">تعديل الأوزان وترتيب التمارين.</p></div><button class="btn" onclick="fresh();days=JSON.parse(localStorage.getItem('gym_days'));hist=[];renderAdmin();alert('تمت إعادة تحميل الخطة الصحيحة')">إعادة تحميل الخطة الصحيحة</button>${days.map((d,di)=>`<div class="form"><h2>${d.emoji} ${d.day} — ${d.title}</h2>${d.ex.map((e,ei)=>`<div class="adminItem"><b>${e.name}</b><button class="btn2" onclick="move(${di},${ei},-1)">↑</button><button class="btn2" onclick="move(${di},${ei},1)">↓</button><button class="btn2" onclick="editWeight(${di},${ei})">وزن</button></div>`).join('')}</div>`).join('')}`}
function move(di,ei,dir){let arr=days[di].ex,ni=ei+dir;if(ni<0||ni>=arr.length)return;[arr[ei],arr[ni]]=[arr[ni],arr[ei]];save();renderAdmin()}
function editWeight(di,ei){let e=days[di].ex[ei];let w=prompt('اكتب الوزن المستهدف',e.targetWeight||'');if(w!==null){e.targetWeight=w;save();renderAdmin()}}
show('home');
</script>
</body>
</html>
