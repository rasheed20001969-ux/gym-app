<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>تطوري الرياضي</title>
<style>
:root{--bg:#081120;--card:#10213a;--card2:#0c1a2d;--line:#203b5f;--text:#fff;--muted:#9fb0c7;--green:#28d17c;--red:#ff6b6b;--blue:#38bdf8;--gold:#fbbf24}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Tahoma,Arial,sans-serif;direction:rtl;padding-bottom:92px}.app{max-width:760px;margin:auto;padding:22px}.top{margin:6px 0 24px}.small{color:var(--muted);font-size:14px}.h1{font-size:34px;font-weight:900;margin:8px 0}.grid{display:grid;gap:14px}.day,.card,.panel{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 10px 30px #0003}.day{display:flex;align-items:center;justify-content:space-between;cursor:pointer}.day .emoji{font-size:30px;background:#07182b;padding:14px;border-radius:18px}.badge{background:#0d3b36;color:var(--green);border:1px solid #16695c;border-radius:18px;padding:9px 14px;font-weight:800}.muted{color:var(--muted)}.nav{position:fixed;bottom:0;left:0;right:0;background:#07101d;border-top:1px solid #1c314d;display:flex;justify-content:center;gap:8px;padding:10px 12px;z-index:20}.nav button{border:0;background:transparent;color:#dbeafe;padding:10px 18px;border-radius:18px;font-size:13px}.nav button.active{background:#0d3b36;color:var(--green);font-weight:900}.hidden{display:none!important}.hero{background:linear-gradient(135deg,#10213a,#0d1930);border:1px solid var(--line);border-radius:28px;padding:24px;margin-bottom:18px}.hero h2{font-size:32px;margin:0 0 8px}.exgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.exercise{background:var(--card);border:1px solid #1c3453;border-radius:22px;padding:18px;min-height:210px}.pill{display:inline-block;background:#2d2a18;color:var(--gold);border-radius:12px;padding:5px 10px;font-size:12px;font-weight:800}.label{color:var(--blue);font-weight:900;margin-top:14px}.danger{color:var(--red);font-weight:900}.btn{border:0;border-radius:18px;background:var(--green);color:#052012;padding:13px 16px;font-weight:900;cursor:pointer}.btn2{border:1px solid var(--line);border-radius:16px;background:#132846;color:var(--text);padding:11px 13px;font-weight:800}.btnDanger{background:#3a1420;color:#ffb4b4;border:1px solid #7f1d1d}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.adminDay{margin-bottom:18px}.adminEx{background:#09192b;border:1px solid #1b3556;border-radius:20px;padding:12px;margin:10px 0;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.actions{display:flex;gap:7px;flex-wrap:wrap}.mini{padding:10px 12px;border-radius:13px;font-size:14px}input,textarea,select{width:100%;background:#07182b;color:#fff;border:1px solid #244365;border-radius:15px;padding:13px;font-size:15px}textarea{min-height:92px}.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.modal{position:fixed;inset:0;background:#0009;display:flex;align-items:flex-end;z-index:50}.sheet{background:#0b1728;border-top:1px solid var(--line);border-radius:28px 28px 0 0;padding:18px;max-height:88vh;overflow:auto;width:100%;max-width:760px;margin:auto}.set{display:grid;grid-template-columns:46px 1fr 1fr 54px;gap:8px;align-items:center;background:#0b1d32;border:1px solid #1f3c60;border-radius:18px;padding:10px;margin:9px 0}.set input{text-align:center}.timer{font-size:28px;font-weight:900;color:var(--green);text-align:center}.stat{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat .card{text-align:center;padding:16px}.big{font-size:28px;font-weight:900;color:var(--green)}@media(max-width:520px){.app{padding:18px}.h1{font-size:30px}.formGrid{grid-template-columns:1fr}.nav button{padding:10px 12px}.adminEx{grid-template-columns:1fr}.set{grid-template-columns:36px 1fr 1fr 44px}}
</style>
</head>
<body>
<div class="app">
  <section id="home" class="screen"></section>
  <section id="plan" class="screen hidden"></section>
  <section id="history" class="screen hidden"></section>
  <section id="admin" class="screen hidden"></section>
</div>
<div class="nav">
<button onclick="show('home')" id="n-home">🏠<br>الرئيسية</button>
<button onclick="show('plan')" id="n-plan">📋<br>الخطة</button>
<button onclick="show('history')" id="n-history">📈<br>السجل</button>
<button onclick="show('admin')" id="n-admin">🛠️<br>الإدارة</button>
</div>
<div id="modal" class="modal hidden"><div id="sheet" class="sheet"></div></div>
<script>
const KEY='tatawori_sports_cms_v5';
const defaultDays=[
{day:'السبت',title:'Full Body خفيف',emoji:'🔥',desc:'جلسة تنشيط لكامل الجسم بهدف زيادة الحرق وتحفيز العضلات بدون إجهاد عالي.',ex:[
{name:'Shoulder Press',sets:3,reps:'10',targetWeight:'',setup:'اضبط الكرسي بحيث تكون المقابض بمستوى الكتف.',technique:'ادفع للأعلى مع شد البطن وعدم تقويس الظهر.',tip:'ثبت الظهر ولا تقفل المرفق بقوة.',mistake:'تقويس أسفل الظهر'},
{name:'Lat Pulldown',sets:3,reps:'10',targetWeight:'',setup:'ثبت الفخذين تحت الوسادة، واجعل القبضة أوسع من الكتف.',technique:'اسحب البار نحو الصدر مع تثبيت الجسم وتحكم كامل في النزول.',tip:'اسحب بالكوع وليس باليد.',mistake:'الاندفاع بالجسم'},
{name:'Chest Press',sets:3,reps:'10',targetWeight:'',setup:'اضبط الكرسي بحيث تكون المقابض بمستوى منتصف الصدر.',technique:'ادفع للأمام بثبات وارجع ببطء مع الحفاظ على شد الصدر.',tip:'اسحب لوحي الكتف للخلف.',mistake:'قفل المرفق أو رفع الكتف'},
{name:'Technogym Elliptical',sets:1,reps:'15-20 دقيقة',targetWeight:'',setup:'اضبط المقاومة بدرجة متوسطة.',technique:'كارديو بعد التمرين، سرعة متوسطة ومقاومة ثابتة.',tip:'حافظ على تنفس منتظم.',mistake:'الاعتماد على اليدين بدل الرجلين'},
{name:'Cable Row',sets:3,reps:'10',targetWeight:'',setup:'اضبط القدمين وثبت الظهر بشكل مستقيم.',technique:'اسحب باتجاه البطن مع جمع لوحي الكتف.',tip:'توقف لحظة عند السحب.',mistake:'السحب بالذراع فقط'},
{name:'Leg Press',sets:3,reps:'12',targetWeight:'',setup:'ضع القدمين بعرض الكتف على المنصة.',technique:'انزل ببطء وادفع بدون قفل الركبة.',tip:'ادفع من الكعب.',mistake:'رفع الحوض'}]},
{day:'الأحد',title:'صدر + باي',emoji:'🔥',desc:'جلسة تركّز على بناء عضلات الصدر وزيادة قوة الذراع مع تحكم عالي في الأداء.',ex:[
{name:'Cable Fly',sets:3,reps:'12-15',targetWeight:'',setup:'البكرات على مستوى الصدر أو أعلى قليلاً.',technique:'اجمع اليدين أمام الصدر مع عصر العضلة، وارجع ببطء.',tip:'حافظ على انحناء بسيط بالمرفق.',mistake:'تحويل التمرين إلى ضغط'},
{name:'Incline Chest Press',sets:3,reps:'8-10',targetWeight:'',setup:'اضبط الكرسي على ميل مناسب للصدر العلوي.',technique:'ادفع للأعلى قليلاً مع التركيز على الصدر العلوي وتحكم كامل بالنزول.',tip:'لا ترفع الكتف للأذن.',mistake:'فتح الكوع بزاوية كبيرة'},
{name:'Technogym Chest Press',sets:4,reps:'6-8',targetWeight:'',setup:'المقابض بمستوى منتصف الصدر.',technique:'ادفع للأمام مع تثبيت الظهر، وارجع ببطء حتى تمدد عضلة الصدر.',tip:'ثبت الكتف للخلف.',mistake:'رفع الكتف أو دفع الجسم للأمام'},
{name:'Hammer Curl',sets:3,reps:'10-12',targetWeight:'',setup:'قف بثبات والدمبل بجانب الجسم.',technique:'ارفع الدمبل بشكل مستقيم بدون تحريك الكتف.',tip:'ثبت المرفق بجانب الجسم.',mistake:'هز الجسم أثناء التمرين'},
{name:'Preacher Curl',sets:3,reps:'10-12',targetWeight:'',setup:'الصدر ملاصق للمسند والذراعان على الوسادة.',technique:'ارفع المقبض ببطء مع تثبيت الذراع، وارجع بتحكم.',tip:'لا تفرد المرفق بالكامل تحت.',mistake:'استخدام الزخم'}]},
{day:'الاثنين',title:'ظهر',emoji:'💪',desc:'جلسة تركّز على توسيع الظهر وزيادة السماكة مع تحكم كامل بالحركة.',ex:[
{name:'Seated Machine Row',sets:3,reps:'10-12',targetWeight:'',setup:'اضبط المقعد بحيث يكون المقبض أمام منتصف البطن.',technique:'صدر مرفوع، اسحب ببطء وارجع بتحكم كامل.',tip:'اجمع لوحي الكتف عند السحب.',mistake:'رمي الوزن بسرعة'},
{name:'Technogym Row Machine',sets:4,reps:'8-10',targetWeight:'',setup:'ثبت الصدر على المسند واضبط المقابض.',technique:'اسحب المقبض باتجاه البطن مع جمع لوحي الكتف.',tip:'لا تستخدم الظهر للتأرجح.',mistake:'السحب بالذراع فقط'},
{name:'Technogym Lat Pulldown',sets:4,reps:'8-10',targetWeight:'',setup:'ثبت الفخذين واجعل الصدر مرفوعًا.',technique:'اسحب البار نحو صدرك مع إنزال الكتفين للخلف وتحت، وارجع ببطء.',tip:'ابدأ الحركة من الكتف.',mistake:'السحب خلف الرقبة أو الاندفاع بالجسم'},
{name:'Straight Arm Pulldown',sets:3,reps:'12-15',targetWeight:'',setup:'اضبط البكرة أعلى من الرأس واستخدم بار مستقيم.',technique:'اسحب البار للأسفل بذراع شبه مستقيمة مع تركيز على اللات.',tip:'اجعل الحركة من الكتف لا من الكوع.',mistake:'ثني الكوع وتحويله لتراي'}]},
{day:'الأربعاء',title:'كتف + تراي',emoji:'⚡',desc:'جلسة لبناء عرض الكتف وتحسين قوة الدفع مع عزل الترايسبس بشكل ذكي.',ex:[
{name:'Rear Delt / Face Pull',sets:3,reps:'12-15',targetWeight:'',setup:'اضبط الحبل على مستوى الوجه.',technique:'اسحب الحبل باتجاه الوجه مع فتح الذراعين للخلف.',tip:'ركز على الخلفية لا الترابيس.',mistake:'سحب بالذراع فقط'},
{name:'Lateral Raise',sets:4,reps:'12-15',targetWeight:'',setup:'اختر وزنًا خفيفًا يسمح بالتحكم.',technique:'ارفع الذراعين للجانب حتى مستوى الكتف مع وزن خفيف وتحكم.',tip:'المرفق يقود الحركة.',mistake:'رفع الكتف للأذن'},
{name:'Technogym Shoulder Press',sets:4,reps:'6-8',targetWeight:'',setup:'المقابض بمستوى الكتف والظهر ملاصق للمسند.',technique:'ادفع للأعلى مع تثبيت الظهر وشد البطن، ثم انزل ببطء.',tip:'لا تقفل المرفق بقوة.',mistake:'تقويس أسفل الظهر'},
{name:'Overhead Triceps Extension',sets:3,reps:'10-12',targetWeight:'',setup:'استخدم الحبل أو المقبض من بكرة منخفضة/متوسطة.',technique:'مد الذراع للأعلى مع إبقاء الكوع قريب من الرأس.',tip:'ثبت الكوع في مكانه.',mistake:'فتح الكوع بشكل مبالغ'},
{name:'Cable Triceps Pushdown',sets:3,reps:'10-12',targetWeight:'',setup:'البكرة في الأعلى والكوع بجانب الجسم.',technique:'ادفع للأسفل مع تثبيت الكوع بجانب الجسم.',tip:'اعصر التراي أسفل الحركة.',mistake:'تحريك الكتف'}]},
{day:'الخميس',title:'أرجل',emoji:'🦵',desc:'نسخة محسنة ومختصرة ليوم الأرجل مع حجم تمرين مناسب للتنسيق والاستشفاء.',ex:[
{name:'Technogym Leg Curl',sets:3,reps:'10-12',targetWeight:'',setup:'اضبط الوسادة فوق الكعبين مباشرة.',technique:'اسحب بالكعب للخلف وتحكم بالنزول ببطء.',tip:'لا ترفع الحوض.',mistake:'رمي الوزن بسرعة'},
{name:'Technogym Leg Press',sets:3,reps:'10-12',targetWeight:'',setup:'القدمين بعرض الكتف على المنصة.',technique:'انزل حتى 90 درجة ثم ادفع بدون قفل الركبة.',tip:'ادفع من الكعب.',mistake:'رفع الحوض من المقعد'},
{name:'Romanian Deadlift',sets:3,reps:'8-10',targetWeight:'',setup:'امسك البار أو الدمبل أمام الجسم والركبة مثنية قليلاً.',technique:'ادفع الحوض للخلف مع ظهر مستقيم، وانزل حتى تشعر بتمدد الخلفية.',tip:'الحركة من الحوض.',mistake:'تحديب الظهر'},
{name:'Smith Squat',sets:4,reps:'6-8',targetWeight:'',setup:'ضع القدمين أمام الجسم قليلًا وثبت البار على أعلى الظهر.',technique:'انزل حتى الفخذ قريب من الموازي مع تثبيت الظهر، ثم ادفع من الكعب للأعلى.',tip:'حافظ على الركبة باتجاه القدم.',mistake:'دخول الركبتين للداخل'}]}
];
let state=load(); let currentDay=0, currentEx=0, startTime=Date.now();
function load(){try{let s=localStorage.getItem(KEY); if(s) return JSON.parse(s)}catch(e){} return {user:{name:'رشيد الحسن'},days:structuredClone(defaultDays),history:[],done:0,streak:0};}
function save(){localStorage.setItem(KEY,JSON.stringify(state)); render();}
function resetPlan(){state.days=structuredClone(defaultDays);save();alert('تمت إعادة تحميل الخطة الصحيحة');}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.getElementById('n-'+id).classList.add('active');render();}
function render(){renderHome();renderPlan();renderHistory();renderAdmin();}
function renderHome(){let exCount=state.days.reduce((a,d)=>a+d.ex.length,0);document.getElementById('home').innerHTML=`<div class="top"><div class="small">مرحباً ${state.user.name}</div><div class="h1">تطوري الرياضي</div><div class="muted">لوحة مختصرة لمتابعة خطتك وتقدمك.</div></div><div class="stat"><div class="card"><div class="big">${state.days.length}</div><div class="muted">أيام</div></div><div class="card"><div class="big">${exCount}</div><div class="muted">تمارين</div></div><div class="card"><div class="big">${state.done||0}</div><div class="muted">مكتمل</div></div></div><br><button class="btn" onclick="show('plan')">ابدأ الخطة</button>`}
function renderPlan(){document.getElementById('plan').innerHTML=`<div class="top"><div class="small">مرحباً ${state.user.name}</div><div class="h1">خطة التمارين</div><div class="muted">اختر اليوم لعرض التمارين وتسجيل الأداء.</div></div><div class="grid">${state.days.map((d,i)=>`<div class="day" onclick="openDay(${i})"><div class="row"><div class="emoji">${d.emoji}</div><div><h2>${d.day}</h2><div class="muted">${d.title}</div></div></div><span class="badge">${d.ex.length} تمارين</span></div>`).join('')}</div>`}
function openDay(i){let d=state.days[i];document.getElementById('sheet').innerHTML=`<div class="hero"><h2>${d.emoji} ${d.day} — ${d.title}</h2><p class="muted">${d.desc||''}</p></div><div class="exgrid">${d.ex.map((e,j)=>`<div class="exercise" onclick="openExercise(${i},${j})"><h2>${e.name}</h2><span class="pill">${e.reps} × ${e.sets}</span><div class="label">الأداء:</div><p>${e.technique||''}</p><div class="label">خطأ:</div><p class="danger">${e.mistake||''}</p></div>`).join('')}</div><br><button class="btn" onclick="startWorkout(${i})">بدء التمرين</button><button class="btn2" onclick="closeModal()">إغلاق</button>`;openModal();}
function openExercise(i,j){let e=state.days[i].ex[j];document.getElementById('sheet').innerHTML=`<h2>${e.name}</h2><p><span class="pill">${e.sets} جولات × ${e.reps}</span> <span class="pill">وزن: ${e.targetWeight||'غير محدد'}</span></p><div class="card"><div class="label">⚙️ إعداد الجهاز</div><p>${e.setup||''}</p><div class="label">🎯 طريقة الأداء</div><p>${e.technique||''}</p><div class="label">💡 التلميح الذهبي</div><p>${e.tip||''}</p><div class="label">❌ الخطأ الشائع</div><p class="danger">${e.mistake||''}</p>${e.image?`<img src="${e.image}" style="width:100%;border-radius:18px">`:''}${e.video?`<p><a style="color:var(--green)" href="${e.video}">رابط الفيديو</a></p>`:''}</div><br><button class="btn" onclick="startWorkout(${i},${j})">بدء هذا التمرين</button><button class="btn2" onclick="closeModal()">إغلاق</button>`;}
function startWorkout(i,j=0){currentDay=i;currentEx=j;startTime=Date.now();workoutScreen();}
function workoutScreen(){let d=state.days[currentDay], e=d.ex[currentEx];let sets=Array.from({length:+e.sets||1},(_,k)=>`<div class="set"><b>${k+1}</b><input placeholder="وزن" value="${e.targetWeight||''}"><input placeholder="عدات" value="${String(e.reps).split('-')[0]||''}"><button class="btn2 mini" onclick="this.textContent='✓'">○</button></div>`).join('');document.getElementById('sheet').innerHTML=`<div class="timer" id="timer">00:00</div><h2>${e.name}</h2><p class="muted">تمرين ${currentEx+1} من ${d.ex.length} — ${d.day}</p><p><span class="pill">الهدف: ${e.sets} جولات × ${e.reps}</span></p>${sets}<textarea id="note" placeholder="ملاحظات"></textarea><br><br><button class="btn" onclick="saveWorkout()">💾 حفظ والتالي</button><button class="btn2" onclick="closeModal()">إنهاء</button>`;openModal();tick();}
function tick(){let t=document.getElementById('timer');if(!t)return;let s=Math.floor((Date.now()-startTime)/1000),m=String(Math.floor(s/60)).padStart(2,'0'),ss=String(s%60).padStart(2,'0');t.textContent=m+':'+ss;setTimeout(tick,1000)}
function saveWorkout(){let d=state.days[currentDay],e=d.ex[currentEx];state.history.unshift({date:new Date().toLocaleString('ar-SA'),day:d.day,ex:e.name,note:document.getElementById('note')?.value||''});state.done=(state.done||0)+1;localStorage.setItem(KEY,JSON.stringify(state));if(currentEx<d.ex.length-1){currentEx++;startTime=Date.now();workoutScreen()}else{alert('تم حفظ تمرين اليوم');closeModal();render();}}
function renderHistory(){document.getElementById('history').innerHTML=`<div class="top"><div class="h1">السجل</div><div class="muted">آخر التمارين المحفوظة.</div></div>${state.history.length?state.history.map(h=>`<div class="card"><b>${h.ex}</b><div class="muted">${h.day} — ${h.date}</div><p>${h.note||''}</p></div><br>`).join(''):'<div class="card muted">لا يوجد سجل حتى الآن.</div>'}`}
function renderAdmin(){document.getElementById('admin').innerHTML=`<div class="top"><div class="h1">الإدارة</div><div class="muted">إضافة، تعديل، حذف، وترتيب الأيام والتمارين.</div></div><div class="row"><button class="btn" onclick="editUser()">تعديل الاسم</button><button class="btn" onclick="editDay()">➕ إضافة يوم</button><button class="btn2" onclick="resetPlan()">إعادة تحميل الخطة الصحيحة</button><button class="btn2 btnDanger" onclick="clearStats()">تصفير الإحصائيات</button></div><br>${state.days.map((d,i)=>`<div class="panel adminDay"><div class="row" style="justify-content:space-between"><h2>${d.emoji} ${d.day} — ${d.title}</h2><div class="actions"><button class="btn2 mini" onclick="editDay(${i})">✏️ اليوم</button><button class="btn2 mini" onclick="addExercise(${i})">➕ تمرين</button><button class="btn2 mini" onclick="moveDay(${i},-1)">↑</button><button class="btn2 mini" onclick="moveDay(${i},1)">↓</button><button class="btn2 btnDanger mini" onclick="deleteDay(${i})">🗑</button></div></div>${d.ex.map((e,j)=>`<div class="adminEx"><b>${e.name}<br><span class="muted">${e.sets} جولات × ${e.reps} — وزن ${e.targetWeight||'غير محدد'}</span></b><div class="actions"><button class="btn2 mini" onclick="editExercise(${i},${j})">✏️</button><button class="btn2 mini" onclick="quickWeight(${i},${j})">وزن</button><button class="btn2 mini" onclick="moveEx(${i},${j},-1)">↑</button><button class="btn2 mini" onclick="moveEx(${i},${j},1)">↓</button><button class="btn2 mini" onclick="copyEx(${i},${j})">نسخ</button><button class="btn2 btnDanger mini" onclick="deleteEx(${i},${j})">🗑</button></div></div>`).join('')}</div>`).join('')}`}
function editUser(){document.getElementById('sheet').innerHTML=`<h2>تعديل الاسم</h2><input id="uname" value="${state.user.name}"><br><br><button class="btn" onclick="state.user.name=document.getElementById('uname').value||'رشيد الحسن';save();closeModal()">حفظ</button><button class="btn2" onclick="closeModal()">إلغاء</button>`;openModal()}
function editDay(i=null){let d=i==null?{day:'',title:'',emoji:'🏋️',desc:'',ex:[]}:state.days[i];document.getElementById('sheet').innerHTML=`<h2>${i==null?'إضافة يوم':'تعديل يوم'}</h2><div class="formGrid"><input id="day" placeholder="اليوم" value="${d.day}"><input id="emoji" placeholder="الأيقونة" value="${d.emoji}"><input id="title" placeholder="العنوان" value="${d.title}"><textarea id="desc" placeholder="الوصف">${d.desc||''}</textarea></div><br><button class="btn" onclick="saveDay(${i===null?-1:i})">حفظ</button><button class="btn2" onclick="closeModal()">إلغاء</button>`;openModal()}
function saveDay(i){let d={day:v('day'),emoji:v('emoji')||'🏋️',title:v('title'),desc:v('desc'),ex:i<0?[]:state.days[i].ex};if(i<0)state.days.push(d);else state.days[i]=d;save();closeModal()}
function addExercise(i){editExercise(i,null)}
function editExercise(i,j){let e=j==null?{name:'',sets:3,reps:'10',targetWeight:'',setup:'',technique:'',tip:'',mistake:'',image:'',video:''}:state.days[i].ex[j];document.getElementById('sheet').innerHTML=`<h2>${j==null?'إضافة تمرين':'تعديل تمرين'}</h2><div class="formGrid"><input id="name" placeholder="اسم التمرين" value="${esc(e.name)}"><input id="sets" placeholder="الجولات" value="${e.sets}"><input id="reps" placeholder="العدات" value="${e.reps}"><input id="targetWeight" placeholder="الوزن" value="${e.targetWeight||''}"></div><br><textarea id="setup" placeholder="إعداد الجهاز">${esc(e.setup||'')}</textarea><textarea id="technique" placeholder="طريقة الأداء">${esc(e.technique||'')}</textarea><textarea id="tip" placeholder="التلميح الذهبي">${esc(e.tip||'')}</textarea><textarea id="mistake" placeholder="الأخطاء الشائعة">${esc(e.mistake||'')}</textarea><input id="image" placeholder="رابط صورة اختياري" value="${e.image||''}"><input id="video" placeholder="رابط فيديو اختياري" value="${e.video||''}"><br><br><button class="btn" onclick="saveExercise(${i},${j===null?-1:j})">حفظ</button><button class="btn2" onclick="closeModal()">إلغاء</button>`;openModal()}
function saveExercise(i,j){let e={name:v('name'),sets:Number(v('sets'))||1,reps:v('reps'),targetWeight:v('targetWeight'),setup:v('setup'),technique:v('technique'),tip:v('tip'),mistake:v('mistake'),image:v('image'),video:v('video')};if(j<0)state.days[i].ex.push(e);else state.days[i].ex[j]=e;save();closeModal()}
function quickWeight(i,j){let w=prompt('اكتب الوزن المستهدف',state.days[i].ex[j].targetWeight||'');if(w!==null){state.days[i].ex[j].targetWeight=w;save()}}
function moveEx(i,j,dir){let a=state.days[i].ex,n=j+dir;if(n<0||n>=a.length)return;[a[j],a[n]]=[a[n],a[j]];save()}
function moveDay(i,dir){let a=state.days,n=i+dir;if(n<0||n>=a.length)return;[a[i],a[n]]=[a[n],a[i]];save()}
function deleteEx(i,j){if(confirm('حذف التمرين؟')){state.days[i].ex.splice(j,1);save()}}
function deleteDay(i){if(confirm('حذف اليوم كاملًا؟')){state.days.splice(i,1);save()}}
function copyEx(i,j){let opts=state.days.map((d,k)=>`${k+1}- ${d.day}`).join('\n');let n=prompt('انسخ إلى أي يوم؟\n'+opts);let idx=Number(n)-1;if(idx>=0&&idx<state.days.length){state.days[idx].ex.push(structuredClone(state.days[i].ex[j]));save()}}
function clearStats(){if(confirm('تصفير السجل والإحصائيات؟')){state.history=[];state.done=0;state.streak=0;save()}}
function v(id){return document.getElementById(id).value.trim()}function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function openModal(){document.getElementById('modal').classList.remove('hidden')}function closeModal(){document.getElementById('modal').classList.add('hidden')}
show('home');
</script>
</body>
</html>
