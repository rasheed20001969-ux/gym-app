<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>تطوري الرياضي</title>
<style>
:root{--bg:#081120;--card:#10213A;--card2:#132844;--text:#fff;--muted:#9fb0c6;--green:#28d17c;--green2:#15a85f;--red:#ff5d6c;--line:rgba(255,255,255,.09);--yellow:#ffd166}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Tahoma,Arial,sans-serif;direction:rtl}button,input,textarea,select{font-family:inherit} .app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:84px}.top{padding:18px 16px 8px}.hello{font-size:13px;color:var(--muted);margin:0 0 5px}.title{font-size:25px;font-weight:900;margin:0}.sub{color:var(--muted);font-size:13px;margin:6px 0 0;line-height:1.6}.card{background:linear-gradient(180deg,var(--card),#0e1c32);border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 14px;box-shadow:0 10px 30px rgba(0,0,0,.2)}.row{display:flex;gap:10px;align-items:center}.between{display:flex;justify-content:space-between;align-items:center;gap:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 14px}.stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px}.stat b{font-size:24px;color:var(--green)}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.btn{border:0;border-radius:16px;background:var(--green);color:#062012;padding:13px 16px;font-weight:900;font-size:15px;cursor:pointer}.btn.secondary{background:var(--card2);color:#fff;border:1px solid var(--line)}.btn.red{background:var(--red);color:#fff}.btn.small{padding:8px 10px;border-radius:12px;font-size:12px}.pill{display:inline-flex;align-items:center;gap:5px;background:rgba(40,209,124,.12);color:var(--green);border:1px solid rgba(40,209,124,.22);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700}.muted{color:var(--muted)}.list{padding:0 14px}.day{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin:10px 0;cursor:pointer}.emoji{width:44px;height:44px;border-radius:15px;background:#0b192e;display:grid;place-items:center;font-size:23px}.exercise{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}.exercise h3{margin:0;font-size:17px}.meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.section-title{font-size:18px;font-weight:900;margin:18px 16px 8px}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(520px,100%);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:rgba(8,17,32,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:9px}.nav button{background:transparent;color:var(--muted);border:0;border-radius:14px;padding:9px 4px;font-weight:800}.nav button.active{background:rgba(40,209,124,.14);color:var(--green)}.hidden{display:none!important}.input{width:100%;background:#09192e;border:1px solid var(--line);color:#fff;border-radius:14px;padding:12px;margin-top:7px;font-size:15px}.label{font-size:12px;color:var(--muted);margin-top:10px;display:block}.set-row{display:grid;grid-template-columns:44px 1fr 1fr 42px;gap:8px;align-items:center;margin:10px 0}.set-no{height:38px;border-radius:13px;background:rgba(40,209,124,.15);display:grid;place-items:center;color:var(--green);font-weight:900}.check{height:38px;border-radius:50%;background:#0b192e;border:1px solid var(--line);color:var(--green);font-weight:900}.check.done{background:var(--green);color:#062012}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:flex-end;z-index:20}.sheet{width:min(520px,100%);margin:0 auto;background:#081120;border-radius:25px 25px 0 0;border:1px solid var(--line);padding:16px;max-height:90vh;overflow:auto}.admin-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.note{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.25);color:#ffe6a2;border-radius:14px;padding:10px;font-size:13px;line-height:1.6}.bar{height:10px;background:#0b192e;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:var(--green);border-radius:999px}.empty{color:var(--muted);text-align:center;padding:28px 10px}.ltr{direction:ltr;text-align:left}.kbd{background:#09192e;border:1px solid var(--line);border-radius:10px;padding:2px 7px;color:#fff}
</style>
</head>
<body>
<div class="app">
  <div id="home" class="screen"></div>
  <div id="plan" class="screen hidden"></div>
  <div id="history" class="screen hidden"></div>
  <div id="admin" class="screen hidden"></div>
</div>
<div class="nav">
  <button onclick="show('home')" id="n-home">🏠<br>الرئيسية</button>
  <button onclick="show('plan')" id="n-plan">📋<br>الخطة</button>
  <button onclick="show('history')" id="n-history">📈<br>السجل</button>
  <button onclick="show('admin')" id="n-admin">🛠️<br>الإدارة</button>
</div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<script>
const seedDays=[
{day:'السبت',title:'كور / بطن',emoji:'🔥',ex:[
{name:'Cable Crunch',sets:4,reps:'12',targetWeight:'20',setup:'اضبط البكرة العلوية، امسك الحبل، انزل بالجذع بدون سحب باليدين.',technique:'اثنِ الجذع للأسفل مع شد عضلات البطن ثم ارجع بتحكم.',tip:'ركز أن الحركة من البطن وليس من الذراعين.',mistake:'سحب الحبل باليدين بدل ثني الجذع.'},
{name:'Ab Crunch Machine',sets:4,reps:'12',targetWeight:'25',setup:'اضبط الكرسي بحيث تكون الوسائد مريحة وثابتة.',technique:'اضغط للأمام بانقباض البطن، آخر جولتين 8 عدات.',tip:'أخرج النفس وقت الانقباض.',mistake:'استخدام الزخم بدل التحكم.'},
{name:'Leg Raise',sets:4,reps:'12',targetWeight:'',setup:'ثبت الظهر واليدين على الجهاز أو الأرض.',technique:'ارفع الرجلين بتحكم وأنزل ببطء، آخر جولتين 8 عدات.',tip:'لا تترك أسفل الظهر يتقوس.',mistake:'نزول الرجلين بسرعة.'},
{name:'Plank',sets:4,reps:'وقت',targetWeight:'',setup:'المرفق تحت الكتف والجسم خط مستقيم.',technique:'ثبت الجسم وشد البطن بدون رفع الحوض.',tip:'تنفس بهدوء ولا تحبس النفس.',mistake:'هبوط الظهر أو رفع الحوض.'}
]},
{day:'الأحد',title:'صدر + باي',emoji:'🔥',ex:[
{name:'Chest Press',sets:4,reps:'12',targetWeight:'37.5',setup:'اضبط الكرسي بحيث تكون المقابض بمستوى منتصف الصدر.',technique:'ادفع للأمام حتى قبل قفل المرفق وارجع ببطء 2-3 ثواني.',tip:'ثبت الكتف واسحب لوحي الكتف للخلف.',mistake:'رفع الكتف للأمام أو قصر مدى الحركة.'},
{name:'Incline Chest Press',sets:4,reps:'12',targetWeight:'',setup:'اضبط الكرسي بحيث يكون الدفع بزاوية مائلة للأعلى.',technique:'ادفع بتحكم وارجع حتى تشعر بتمدد أعلى الصدر.',tip:'لا تجعل الكتف يسبق الصدر.',mistake:'تقويس الظهر بشكل مبالغ.'},
{name:'Cable Fly',sets:4,reps:'12',targetWeight:'',setup:'البكرات على مستوى مناسب، قدم متقدمة، الصدر مرفوع، الكوع غير مقفل.',technique:'قرّب اليدين أمام الصدر وتحكم بالرجوع.',tip:'تخيل أنك تقرّب عضلتي الصدر من بعض.',mistake:'ثني المرفق كثيرًا وتحويلها لضغط.'},
{name:'Preacher Curl',sets:4,reps:'12',targetWeight:'',setup:'الكرسي مناسب، الصدر ملاصق للمسند، الذراعان كاملتان على الوسادة.',technique:'ارفع الوزن بانقباض الباي وانزل ببطء.',tip:'ثبت المرفق ولا ترفعه عن الوسادة.',mistake:'الارتداد بالوزن.'},
{name:'Hammer Curl',sets:4,reps:'12',targetWeight:'',setup:'قف بثبات والقبضة محايدة.',technique:'ارفع الدمبل بدون تحريك الكتف وأنزل بتحكم.',tip:'حافظ على الرسغ مستقيم.',mistake:'أرجحة الجسم.'}
]},
{day:'الاثنين',title:'ظهر + ساعد',emoji:'💪',ex:[
{name:'Lat Pulldown',sets:4,reps:'12',targetWeight:'',setup:'ثبت الركبتين واضبط القبضة بعرض مناسب.',technique:'اسحب البار لأعلى الصدر مع إبقاء الصدر مرفوعًا.',tip:'ابدأ السحب من الظهر لا من اليد.',mistake:'السحب خلف الرقبة أو إرجاع الجسم كثيرًا.'},
{name:'Seated Machine Row',sets:4,reps:'12',targetWeight:'',setup:'اضبط الكرسي والصدر ثابت على المسند.',technique:'اسحب حتى يقترب المقبض من الجسم واعصر لوحي الكتف.',tip:'توقف لحظة عند نهاية السحب.',mistake:'تدوير الظهر للأمام.'},
{name:'Straight Arm Pulldown',sets:4,reps:'12',targetWeight:'',setup:'البكرة علوية والذراع شبه مستقيم.',technique:'اسحب للأسفل بقوس ثابت حتى الفخذ.',tip:'شد الظهر العريض طوال الحركة.',mistake:'ثني المرفق وتحويلها ترايسبس.'},
{name:'Wrist Curl',sets:4,reps:'12',targetWeight:'',setup:'ثبت الساعد على الفخذ أو المقعد.',technique:'حرّك الرسغ فقط للأعلى والأسفل.',tip:'مدى حركة كامل بدون استعجال.',mistake:'تحريك الساعد كاملًا.'},
{name:'Reverse Wrist Curl',sets:4,reps:'12',targetWeight:'',setup:'قبضة عكسية والساعد ثابت.',technique:'ارفع الرسغ للأعلى ثم أنزل ببطء.',tip:'اختر وزن خفيف وتحكم كامل.',mistake:'استخدام وزن أعلى من اللازم.'},
{name:'Farmer Walk',sets:4,reps:'مسافة/وقت',targetWeight:'',setup:'امسك الدمبلين بجانب الجسم والظهر مستقيم.',technique:'امشِ بخطوات ثابتة مع شد الكور.',tip:'لا تمِل للأمام أو الجانبين.',mistake:'ترك الكتف يهبط.'}
]},
{day:'الأربعاء',title:'كتف + تراي',emoji:'⚡',ex:[
{name:'Shoulder Press',sets:4,reps:'12',targetWeight:'',setup:'اضبط الكرسي بحيث تكون المقابض بمستوى الكتف.',technique:'ادفع للأعلى بدون قفل المرفق ثم انزل بتحكم.',tip:'شد البطن وثبت الظهر.',mistake:'تقويس الظهر أو رفع الكتف.'},
{name:'Lateral Raise',sets:4,reps:'12',targetWeight:'',setup:'قف بثبات والدمبل بجانب الجسم.',technique:'ارفع الذراعين حتى مستوى الكتف مع انحناء بسيط.',tip:'ابدأ الحركة من الكوع وليس اليد.',mistake:'رفع الوزن فوق مستوى الكتف.'},
{name:'Rear Delt / Face Pull',sets:4,reps:'12',targetWeight:'',setup:'اضبط البكرة بمستوى الوجه، قبضة محايدة.',technique:'اسحب باتجاه الوجه مع فتح المرفقين.',tip:'ارجع حتى مستوى الكتف.',mistake:'سحبها كتمرين ظهر بدل كتف خلفي.'},
{name:'Cable Pushdown',sets:4,reps:'12',targetWeight:'',setup:'بكرة علوية، المرفقان ملاصقان للجسم.',technique:'ادفع للأسفل حتى تمد الذراع ثم ارجع بتحكم.',tip:'ثبت المرفقين في مكانهم.',mistake:'تحريك الكتف للأمام.'},
{name:'Overhead Extension',sets:4,reps:'12',targetWeight:'',setup:'بكرة منخفضة أو دمبل خلف الرأس.',technique:'مد الذراع للأعلى مع ثبات المرفق.',tip:'اشعر بالتمدد قبل الدفع.',mistake:'فتح المرفقين كثيرًا.'}
]},
{day:'الخميس',title:'أرجل',emoji:'🦵',ex:[
{name:'Leg Press',sets:4,reps:'12',targetWeight:'',setup:'ضع القدمين بعرض الكتف على المنصة.',technique:'انزل حتى زاوية مناسبة ثم ادفع بدون قفل الركبة.',tip:'ادفع من الكعب لا من أطراف الأصابع.',mistake:'قفل الركبة أو رفع الحوض.'},
{name:'Hack Squat',sets:4,reps:'12',targetWeight:'',setup:'الظهر ملاصق للمسند والقدمين ثابتتين.',technique:'انزل بتحكم وادفع للأعلى مع ثبات الركبة.',tip:'حافظ على مسار الركبة مع القدم.',mistake:'دخول الركبة للداخل.'},
{name:'Leg Extension',sets:4,reps:'12',targetWeight:'',setup:'اضبط الوسادة فوق الكاحل والظهر ثابت.',technique:'ارفع الساق حتى الانقباض ثم انزل ببطء.',tip:'توقف لحظة في الأعلى.',mistake:'الاندفاع السريع بالوزن.'},
{name:'Leg Curl',sets:4,reps:'12',targetWeight:'',setup:'اضبط الوسادة خلف الكاحل وثبت الورك.',technique:'اثنِ الركبة حتى الانقباض ثم ارجع بتحكم.',tip:'لا ترفع الورك من الجهاز.',mistake:'نصف مدى الحركة.'},
{name:'Hip Thrust',sets:4,reps:'12',targetWeight:'',setup:'ثبت أعلى الظهر والقدمين بعرض مناسب.',technique:'ارفع الحوض حتى خط مستقيم مع شد المؤخرة.',tip:'ذقنك للداخل ولا تبالغ بتقويس الظهر.',mistake:'الدفع بأسفل الظهر بدل المؤخرة.'},
{name:'Calf Raise',sets:4,reps:'12',targetWeight:'',setup:'ثبت مقدمة القدم على الحافة.',technique:'ارفع الكعب لأعلى ثم انزل لتمدد كامل.',tip:'لا تستعجل الحركة.',mistake:'مدى حركة قصير.'}
]}
];
let days=JSON.parse(localStorage.getItem('days_v5')||'null')||seedDays;
let history=JSON.parse(localStorage.getItem('hist_v5')||'[]');
let user=JSON.parse(localStorage.getItem('user_v5')||'null')||{name:'رشيد الحسن',age:25,weight:80,height:175};
let current={dayIndex:0,exIndex:0,start:0};
function save(){localStorage.setItem('days_v5',JSON.stringify(days));localStorage.setItem('hist_v5',JSON.stringify(history));localStorage.setItem('user_v5',JSON.stringify(user));}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.getElementById('n-'+id).classList.add('active');render(id)}
function topHtml(title,sub=''){return `<div class="top"><p class="hello">مرحبًا ${user.name}</p><h1 class="title">${title}</h1>${sub?`<p class="sub">${sub}</p>`:''}</div>`}
function doneCount(){return history.length}
function renderHome(){let totalEx=days.reduce((a,d)=>a+d.ex.length,0);let pct=Math.min(100,Math.round((doneCount()/Math.max(1,totalEx))*100));document.getElementById('home').innerHTML=topHtml('تطوري الرياضي','تطبيقك الشخصي لتسجيل الأوزان والجولات ومتابعة تطورك.')+`<div class="card"><div class="between"><div><div class="pill">جاهز للتمرين</div><h2 style="margin:12px 0 4px">ابدأ تمرين اليوم</h2><p class="sub">اختر اليوم وسجل كل جولة بالوزن والتكرارات.</p></div><div class="emoji">🏋️</div></div><button class="btn" style="width:100%;margin-top:14px" onclick="show('plan')">ابدأ الآن</button></div><div class="grid"><div class="stat"><b>${days.length}</b><span>أيام تدريب</span></div><div class="stat"><b>${totalEx}</b><span>تمرين</span></div><div class="stat"><b>${doneCount()}</b><span>مكتمل</span></div><div class="stat"><b>${pct}%</b><span>التقدم</span></div></div><div class="card"><div class="between"><b>نسبة التقدم</b><span class="muted">${pct}%</span></div><div class="bar" style="margin-top:12px"><i style="width:${pct}%"></i></div></div><h3 class="section-title">آخر تسجيل</h3>${history[0]?histCard(history[0]):'<div class="card empty">لا يوجد تسجيل بعد.</div>'}`}
function renderPlan(){document.getElementById('plan').innerHTML=topHtml('خطة التمارين','اختر اليوم لعرض التمارين وتسجيل الأداء.')+`<div class="list">${days.map((d,i)=>`<div class="day" onclick="openDay(${i})"><div class="between"><div class="row"><div class="emoji">${d.emoji}</div><div><b>${d.day}</b><div class="muted">${d.title}</div></div></div><span class="pill">${d.ex.length} تمارين</span></div></div>`).join('')}</div>`}
function openDay(i){let d=days[i];modal(`<div class="between"><h2 style="margin:0">${d.emoji} ${d.day} — ${d.title}</h2><button class="btn small secondary" onclick="closeModal()">إغلاق</button></div><div class="list" style="padding:0;margin-top:10px">${d.ex.map((e,j)=>exerciseCard(e,i,j)).join('')}</div>`)}
function exerciseCard(e,i,j){return `<div class="exercise"><div class="between"><h3>${j+1}. ${e.name}</h3><span class="pill">${e.sets} جولات × ${e.reps}</span></div><div class="meta"><span class="pill">⚖️ ${e.targetWeight||'بدون وزن'} كجم</span></div><p class="sub"><b>⚙️ الإعداد:</b> ${e.setup}</p><p class="sub"><b>🎯 الأداء:</b> ${e.technique}</p><p class="note"><b>💡 التلميح:</b> ${e.tip}<br><b>❌ خطأ شائع:</b> ${e.mistake}</p><button class="btn" style="width:100%;margin-top:10px" onclick="startWorkout(${i},${j})">▶ بدء التمرين</button></div>`}
let timerInt=null;
function startWorkout(di,ei){current={dayIndex:di,exIndex:ei,start:Date.now()};workoutScreen()}
function workoutScreen(){let d=days[current.dayIndex],e=d.ex[current.exIndex];let rows='';for(let s=1;s<=Number(e.sets||4);s++){rows+=`<div class="set-row"><div class="set-no">جولة ${s}</div><input class="input" id="w${s}" placeholder="وزن" value="${e.targetWeight||''}"><input class="input" id="r${s}" placeholder="عدات" value="${String(e.reps||'').split('-')[0].replace('وقت','')}"><button class="check" onclick="this.classList.toggle('done');this.textContent=this.classList.contains('done')?'✓':''"></button></div>`}modal(`<div class="between"><div><div class="pill" id="timer">00:00</div><h2 style="margin:10px 0 0">${e.name}</h2><div class="muted">تمرين ${current.exIndex+1} من ${d.ex.length} — ${d.day}</div></div><button class="btn small secondary" onclick="closeModal()">إنهاء</button></div><div class="card" style="margin:12px 0"><b>الهدف:</b> ${e.sets} جولات × ${e.reps} | الوزن المستهدف: ${e.targetWeight||'غير محدد'} كجم</div>${rows}<label class="label">ملاحظات</label><textarea class="input" id="note" rows="3" placeholder="اكتب ملاحظاتك هنا"></textarea><button class="btn" style="width:100%;margin-top:12px" onclick="saveWorkout()">💾 حفظ والتالي</button>`);clearInterval(timerInt);timerInt=setInterval(()=>{let sec=Math.floor((Date.now()-current.start)/1000),m=String(Math.floor(sec/60)).padStart(2,'0'),s=String(sec%60).padStart(2,'0');let t=document.getElementById('timer');if(t)t.textContent=m+':'+s},1000)}
function saveWorkout(){let d=days[current.dayIndex],e=d.ex[current.exIndex];let sets=[];for(let s=1;s<=Number(e.sets||4);s++){sets.push({set:s,weight:document.getElementById('w'+s).value,reps:document.getElementById('r'+s).value})}history.unshift({date:new Date().toLocaleString('ar-SA'),day:d.day,exercise:e.name,sets,notes:document.getElementById('note').value});save();if(current.exIndex<d.ex.length-1){current.exIndex++;current.start=Date.now();workoutScreen()}else{closeModal();alert('تم حفظ تمرين اليوم ✅');show('home')}}
function histCard(h){return `<div class="exercise"><b>${h.exercise}</b><div class="muted">${h.day} — ${h.date}</div><div class="meta">${h.sets.map(s=>`<span class="pill">جولة ${s.set}: ${s.weight||'-'}كجم × ${s.reps||'-'}</span>`).join('')}</div>${h.notes?`<p class="sub">${h.notes}</p>`:''}</div>`}
function renderHistory(){document.getElementById('history').innerHTML=topHtml('السجل والتقدم','كل التمارين المحفوظة تظهر هنا.')+(history.length?`<div class="list">${history.map(histCard).join('')}</div>`:'<div class="card empty">لا يوجد سجل بعد.</div>')+`<div class="card"><button class="btn red" style="width:100%" onclick="if(confirm('تأكيد تصفير السجل؟')){history=[];save();renderHistory();renderHome()} ">تصفير السجل</button></div>`}
function renderAdmin(){document.getElementById('admin').innerHTML=topHtml('الإدارة','عدّل الأيام والتمارين والأوزان والتكرارات والترتيب.')+`<div class="card"><label class="label">اسم المستخدم</label><input class="input" value="${user.name}" onchange="user.name=this.value;save();renderAdmin()"><button class="btn secondary" style="width:100%;margin-top:12px" onclick="resetData()">إعادة ضبط البيانات الأساسية</button></div><div class="list">${days.map((d,i)=>`<div class="day"><div class="between"><div class="row"><div class="emoji">${d.emoji}</div><div><b>${d.day}</b><div class="muted">${d.title}</div></div></div><button class="btn small" onclick="editDay(${i})">تعديل</button></div><div style="margin-top:10px">${d.ex.map((e,j)=>`<div class="exercise"><div class="between"><div><b>${j+1}. ${e.name}</b><div class="muted">${e.sets} جولات × ${e.reps} — ${e.targetWeight||'-'} كجم</div></div></div><div class="admin-actions"><button class="btn small secondary" onclick="moveEx(${i},${j},-1)">↑</button><button class="btn small secondary" onclick="moveEx(${i},${j},1)">↓</button><button class="btn small" onclick="editEx(${i},${j})">✏️ تعديل</button><button class="btn small red" onclick="delEx(${i},${j})">🗑 حذف</button></div></div>`).join('')}</div><button class="btn secondary" style="width:100%;margin-top:10px" onclick="editEx(${i},-1)">➕ إضافة تمرين</button></div>`).join('')}</div>`}
function editDay(i){let d=days[i];modal(`<h2>تعديل اليوم</h2><label class="label">اليوم</label><input class="input" id="day" value="${d.day}"><label class="label">العنوان</label><input class="input" id="title" value="${d.title}"><label class="label">الإيموجي</label><input class="input" id="emoji" value="${d.emoji}"><button class="btn" style="width:100%;margin-top:12px" onclick="days[${i}].day=day.value;days[${i}].title=title.value;days[${i}].emoji=emoji.value;save();closeModal();renderAdmin()">حفظ</button>`)}
function editEx(di,ei){let e=ei>=0?days[di].ex[ei]:{name:'',sets:4,reps:'12',targetWeight:'',setup:'',technique:'',tip:'',mistake:''};modal(`<h2>${ei>=0?'تعديل تمرين':'إضافة تمرين'}</h2>${['name:اسم التمرين','sets:عدد الجولات','reps:عدد التكرارات','targetWeight:الوزن المستهدف','setup:إعداد الجهاز','technique:طريقة الأداء','tip:التلميح الذهبي','mistake:الخطأ الشائع'].map(x=>{let [k,l]=x.split(':');return `<label class="label">${l}</label><textarea class="input" id="${k}" rows="${['setup','technique','tip','mistake'].includes(k)?2:1}">${e[k]||''}</textarea>`}).join('')}<button class="btn" style="width:100%;margin-top:12px" onclick="saveEx(${di},${ei})">حفظ</button>`)}
function saveEx(di,ei){let obj={name:name.value,sets:Number(sets.value||4),reps:reps.value,targetWeight:targetWeight.value,setup:setup.value,technique:technique.value,tip:tip.value,mistake:mistake.value};if(ei>=0)days[di].ex[ei]=obj;else days[di].ex.push(obj);save();closeModal();renderAdmin()}
function delEx(di,ei){if(confirm('حذف التمرين؟')){days[di].ex.splice(ei,1);save();renderAdmin()}}
function moveEx(di,ei,dir){let arr=days[di].ex,ni=ei+dir;if(ni<0||ni>=arr.length)return;[arr[ei],arr[ni]]=[arr[ni],arr[ei]];save();renderAdmin()}
function resetData(){if(confirm('سيتم إعادة التمارين الأساسية وتصفير السجل. هل أنت متأكد؟')){days=JSON.parse(JSON.stringify(seedDays));history=[];user.name='رشيد الحسن';save();renderAdmin();renderHome()}}
function modal(html){document.getElementById('sheet').innerHTML=html;document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none';clearInterval(timerInt)}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
function render(id){if(id==='home')renderHome();if(id==='plan')renderPlan();if(id==='history')renderHistory();if(id==='admin')renderAdmin()}
show('home');
</script>
</body>
</html>
